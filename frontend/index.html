<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskmaster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f3f6fc;
      --surface: #ffffff;
      --surface-2: #f8fafe;
      --border: #d8e1ef;
      --text: #10203a;
      --muted: #54637d;
      --brand: #0c65ff;
      --brand-2: #074ac0;
      --success: #0b9d68;
      --danger: #d6384d;
      --shadow: 0 10px 25px rgba(16, 32, 58, 0.09);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, #e6efff 0%, transparent 30%),
        radial-gradient(circle at bottom left, #ecf8f4 0%, transparent 26%),
        var(--bg);
      min-height: 100vh;
    }

    h1, h2, h3 {
      font-family: "Manrope", sans-serif;
      margin: 0;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(12, 101, 255, 0.12);
    }

    textarea {
      min-height: 94px;
      resize: vertical;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.18s ease;
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(180deg, #2a7dff 0%, #0c65ff 100%);
      box-shadow: 0 8px 16px rgba(12, 101, 255, 0.26);
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(180deg, #1d72f3 0%, #0753d0 100%);
    }

    .btn-secondary {
      background: var(--surface-2);
      color: var(--text);
      border-color: var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: #edf2fb;
    }

    .btn-danger {
      background: #fff1f3;
      color: var(--danger);
      border-color: #ffd3da;
    }

    .status-msg {
      margin-top: 10px;
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      display: none;
    }

    .status-msg.show {
      display: block;
    }

    .status-msg.ok {
      color: #106946;
      background: #e9fbf3;
      border: 1px solid #b7efd6;
    }

    .status-msg.error {
      color: #91283a;
      background: #fff1f3;
      border: 1px solid #ffd3da;
    }

    .auth-container {
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .auth-container.show {
      display: flex;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 26px;
      box-shadow: var(--shadow);
    }

    .auth-title {
      margin-bottom: 8px;
      font-size: 28px;
      line-height: 1;
    }

    .auth-sub {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
      padding: 4px;
      border-radius: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
    }

    .auth-tab-btn {
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-weight: 600;
      padding: 9px;
      cursor: pointer;
    }

    .auth-tab-btn.active {
      color: var(--text);
      background: #fff;
      box-shadow: 0 2px 8px rgba(16, 32, 58, 0.1);
    }

    .auth-tab-content {
      display: none;
    }

    .auth-tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .app-container {
      display: none;
      height: 100vh;
      grid-template-rows: auto 1fr;
    }

    .app-container.show {
      display: grid;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .app-logo {
      font-family: "Manrope", sans-serif;
      font-size: 23px;
      font-weight: 800;
      letter-spacing: -0.4px;
      color: #0b3ca1;
      margin-right: 4px;
    }

    .header-field {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
    }

    .header-field label {
      white-space: nowrap;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .header-field select {
      width: auto;
      min-width: 160px;
      background: var(--surface-2);
      border-radius: 8px;
      padding: 7px 9px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-info {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .app-body {
      min-height: 0;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 0;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      padding: 16px;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.8);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .panel h3 {
      margin-bottom: 10px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .panel .btn {
      width: 100%;
      margin-bottom: 8px;
      text-align: left;
    }

    .filter {
      margin-bottom: 10px;
    }

    .filter label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .main {
      padding: 16px;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toolbar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
    }

    .toolbar-note {
      margin-top: -2px;
      margin-bottom: 2px;
      padding: 8px 10px;
      border: 1px dashed #b7c9e8;
      border-radius: 10px;
      background: #f2f7ff;
      color: #2f4773;
      font-size: 13px;
    }

    .toolbar h1 {
      font-size: 22px;
      grid-column: 1 / -1;
    }

    .search-input {
      min-width: 0;
    }

    .toolbar select {
      min-width: 150px;
      width: auto;
    }

    .board {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(240px, 1fr));
      gap: 12px;
    }

    .column {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      min-height: 460px;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow);
    }

    .column-header {
      padding: 11px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface-2);
    }

    .column-title {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .column-count {
      min-width: 22px;
      text-align: center;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      color: #fff;
      background: var(--brand);
      font-weight: 700;
    }

    .column-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      transition: 0.16s ease;
      cursor: pointer;
    }

    .task:hover {
      border-color: #92b8ff;
      box-shadow: 0 10px 18px rgba(12, 101, 255, 0.12);
      transform: translateY(-1px);
    }

    .task-title {
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.35;
    }

    .task-meta {
      color: var(--muted);
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 8px;
    }

    .task-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .task-action {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--text);
      font-size: 11px;
      padding: 4px 7px;
      cursor: pointer;
    }

    .task-action:hover {
      border-color: #89b1ff;
      background: #edf4ff;
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10px;
    }

    .load-more {
      display: none;
      justify-content: center;
    }

    .load-more.show {
      display: flex;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(16, 32, 58, 0.35);
      padding: 14px;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      width: 100%;
      max-width: 720px;
      max-height: 92vh;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 26px 50px rgba(16, 32, 58, 0.23);
      padding: 16px;
    }

    .modal-header {
      margin-bottom: 12px;
    }

    .modal-header h2 {
      font-size: 22px;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .modal-section {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    .modal-section h3 {
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .comments-list,
    .attachments-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
      min-height: 60px;
    }

    .comment-item,
    .attachment-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-2);
      padding: 9px 10px;
    }

    .comment-author {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .comment-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .comment-text {
      margin: 0;
      white-space: pre-wrap;
    }

    .comment-time,
    .attachment-size {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .comment-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }

    .attachment-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .attachment-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .comment-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .attachment-preview {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      min-height: 120px;
      padding: 8px;
      display: none;
      margin-top: 8px;
    }

    .attachment-preview.show {
      display: block;
    }

    .attachment-preview img,
    .attachment-preview iframe,
    .attachment-preview pre {
      width: 100%;
      max-height: 360px;
      border: 0;
      margin: 0;
      border-radius: 8px;
      background: #fff;
    }

    .attachment-preview pre {
      white-space: pre-wrap;
      overflow: auto;
      padding: 10px;
      border: 1px solid var(--border);
    }

    .attachment-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .modal-actions {
      margin-top: 14px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 30;
      padding: 12px 14px;
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      opacity: 0;
      transform: translateY(10px);
      transition: 0.2s ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: var(--success);
    }

    .toast.error {
      background: var(--danger);
    }

    @media (max-width: 1200px) {
      .app-body {
        grid-template-columns: 260px 1fr;
      }
    }

    @media (max-width: 980px) {
      .app-body {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }

      .board {
        grid-template-columns: 1fr;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .toolbar h1 {
        grid-column: auto;
      }

      .toolbar select {
        width: 100%;
      }

      .header-field {
        width: 100%;
      }

      .header-field select {
        width: 100%;
        min-width: 0;
      }

      .header-right {
        width: 100%;
        justify-content: space-between;
      }
    }

    @media (max-width: 640px) {
      .comment-form,
      .attachment-row,
      .modal-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container" id="authContainer">
    <div class="auth-card">
      <h1 class="auth-title">Taskmaster</h1>
      <p class="auth-sub">Operational task tracking for teams.</p>

      <div class="auth-tabs">
        <button class="auth-tab-btn active" data-tab="login">Sign In</button>
        <button class="auth-tab-btn" data-tab="register">Sign Up</button>
      </div>

      <div class="auth-tab-content active" id="loginTab">
        <div class="form-group">
          <label for="loginUsername">Username</label>
          <input id="loginUsername" type="text" />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" />
        </div>
        <div class="form-group">
          <label for="apiBase">API URL</label>
          <input id="apiBase" value="http://127.0.0.1:8000" />
        </div>
        <button class="btn btn-primary" id="loginBtn" type="button">Sign In</button>
        <div class="status-msg" id="loginStatus"></div>
      </div>

      <div class="auth-tab-content" id="registerTab">
        <div class="form-group">
          <label for="regUsername">Username</label>
          <input id="regUsername" type="text" />
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input id="regEmail" type="email" />
        </div>
        <div class="form-group">
          <label for="regFullname">Full Name</label>
          <input id="regFullname" type="text" />
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input id="regPassword" type="password" />
        </div>
        <div class="form-group">
          <label for="apiBaseRegister">API URL</label>
          <input id="apiBaseRegister" value="http://127.0.0.1:8000" />
        </div>
        <button class="btn btn-primary" id="registerBtn" type="button">Create Account</button>
        <div class="status-msg" id="registerStatus"></div>
      </div>
    </div>
  </div>

  <div class="app-container" id="appContainer">
    <header class="app-header">
      <div class="header-left">
        <div class="app-logo">Taskmaster</div>
        <div class="header-field">
          <label for="teamSelect">Team</label>
          <select id="teamSelect"></select>
        </div>
        <div class="header-field">
          <label for="projectSelect">Project</label>
          <select id="projectSelect"></select>
        </div>
      </div>
      <div class="header-right">
        <div class="user-info" id="userInfo"></div>
        <button class="btn btn-secondary" id="logoutBtn" type="button">Log out</button>
      </div>
    </header>

    <div class="app-body">
      <aside class="sidebar">
        <div class="panel">
          <h3>Create</h3>
          <button class="btn btn-primary" id="createTaskBtn" type="button">New Task</button>
          <button class="btn btn-secondary" id="createProjectBtn" type="button">New Project</button>
          <button class="btn btn-secondary" id="createTeamBtn" type="button">New Team</button>
        </div>

        <div class="panel">
          <h3>Filters</h3>
          <div class="filter">
            <label for="filterAssignee">Assignee</label>
            <select id="filterAssignee"></select>
          </div>
          <div class="filter">
            <label for="filterStatus">Status</label>
            <select id="filterStatus">
              <option value="">All</option>
              <option value="open">Open</option>
              <option value="in_progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <button class="btn btn-secondary" id="clearFiltersBtn" type="button">Clear Filters</button>
        </div>

        <div class="panel">
          <h3>Tools</h3>
          <button class="btn btn-secondary" id="refreshBtn" type="button">Refresh</button>
        </div>
      </aside>

      <main class="main">
        <div class="toolbar">
          <h1>Tasks</h1>
          <input class="search-input" id="searchInput" type="text" placeholder="Search tasks..." />
          <select id="sortSelect">
            <option value="created_at">Created</option>
            <option value="due_date">Due Date</option>
            <option value="title">Title</option>
          </select>
        </div>

        <div class="toolbar-note">Click any task card or the Details button to open comments and attachments.</div>

        <section class="board">
          <div class="column">
            <div class="column-header">
              <h3 class="column-title">Open</h3>
              <div class="column-count" id="count-open">0</div>
            </div>
            <div class="column-body" id="col-open"></div>
          </div>

          <div class="column">
            <div class="column-header">
              <h3 class="column-title">In Progress</h3>
              <div class="column-count" id="count-in-progress">0</div>
            </div>
            <div class="column-body" id="col-in-progress"></div>
          </div>

          <div class="column">
            <div class="column-header">
              <h3 class="column-title">Completed</h3>
              <div class="column-count" id="count-completed">0</div>
            </div>
            <div class="column-body" id="col-completed"></div>
          </div>
        </section>

        <div class="load-more" id="loadMoreContainer">
          <button class="btn btn-secondary" id="loadMoreBtn" type="button">Load More Tasks</button>
        </div>
      </main>
    </div>
  </div>

  <div class="modal" id="taskModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="taskModalTitle">New Task</h2>
      </div>

      <div class="form-group">
        <label for="taskTitle">Title</label>
        <input id="taskTitle" />
      </div>

      <div class="modal-grid">
        <div class="form-group">
          <label for="taskProject">Project</label>
          <select id="taskProject"></select>
        </div>
        <div class="form-group">
          <label for="taskAssignee">Assignee</label>
          <select id="taskAssignee"></select>
        </div>
      </div>

      <div class="modal-grid">
        <div class="form-group">
          <label for="taskDueDate">Due Date</label>
          <input id="taskDueDate" type="datetime-local" />
        </div>
        <div class="form-group" id="taskStatusWrap" style="display: none;">
          <label for="taskStatus">Status</label>
          <select id="taskStatus">
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="taskDesc">Description</label>
        <textarea id="taskDesc"></textarea>
      </div>

      <div id="taskDetailsArea" style="display: none;">
        <div class="modal-section">
          <h3>Comments</h3>
          <div class="comments-list" id="commentsList"></div>
          <div class="comment-form">
            <textarea id="commentInput" placeholder="Write a comment..."></textarea>
            <button class="btn btn-primary" id="addCommentBtn" type="button">Add Comment</button>
          </div>
        </div>

        <div class="modal-section">
          <h3>Attachments</h3>
          <div class="attachments-list" id="attachmentsList"></div>
          <div class="attachment-row">
            <input id="fileInput" type="file" />
            <button class="btn btn-secondary" id="addAttachmentBtn" type="button">Upload File</button>
          </div>
          <div class="attachment-preview" id="attachmentPreview"></div>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-primary" id="submitTaskBtn" type="button">Create</button>
        <button class="btn btn-secondary" id="cancelTaskBtn" type="button">Cancel</button>
      </div>

      <div class="status-msg" id="taskModalStatus"></div>
    </div>
  </div>

  <div class="modal" id="projectModal">
    <div class="modal-content" style="max-width: 460px;">
      <div class="modal-header">
        <h2>New Project</h2>
      </div>
      <div class="form-group">
        <label for="projectName">Name</label>
        <input id="projectName" />
      </div>
      <div class="form-group">
        <label for="projectTeam">Team</label>
        <select id="projectTeam"></select>
      </div>
      <div class="form-group">
        <label for="projectDesc">Description</label>
        <input id="projectDesc" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="submitProjectBtn" type="button">Create</button>
        <button class="btn btn-secondary" id="cancelProjectBtn" type="button">Cancel</button>
      </div>
      <div class="status-msg" id="projectModalStatus"></div>
    </div>
  </div>

  <div class="modal" id="teamModal">
    <div class="modal-content" style="max-width: 460px;">
      <div class="modal-header">
        <h2>New Team</h2>
      </div>
      <div class="form-group">
        <label for="teamName">Name</label>
        <input id="teamName" />
      </div>
      <div class="form-group">
        <label for="teamDesc">Description</label>
        <input id="teamDesc" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="submitTeamBtn" type="button">Create</button>
        <button class="btn btn-secondary" id="cancelTeamBtn" type="button">Cancel</button>
      </div>
      <div class="status-msg" id="teamModalStatus"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const el = (id) => document.getElementById(id);

    let baseUrl = localStorage.getItem("tm_api_base") || "http://127.0.0.1:8000";
    let token = localStorage.getItem("tm_token") || "";

    const state = {
      teams: [],
      projects: [],
      members: [],
      tasks: [],
      editingId: null,
      pagination: {
        offset: 0,
        limit: 50,
        hasMore: false,
      },
      filters: {
        teamId: localStorage.getItem("tm_team_id") || "",
        projectId: localStorage.getItem("tm_project_id") || "",
        assignee: "",
        status: "",
        search: "",
        sort: "created_at",
      },
      undo: null,
    };

    function toast(message, type = "success") {
      const t = el("toast");
      t.className = `toast ${type} show`;
      t.textContent = message;
      setTimeout(() => t.classList.remove("show"), 2400);
    }

    function clearStatus(id) {
      const node = el(id);
      node.textContent = "";
      node.className = "status-msg";
    }

    function setStatus(id, text, type = "error") {
      const node = el(id);
      node.textContent = text;
      node.className = `status-msg show ${type}`;
    }

    function toAuth() {
      el("authContainer").classList.add("show");
      el("appContainer").classList.remove("show");
    }

    function toApp() {
      el("authContainer").classList.remove("show");
      el("appContainer").classList.add("show");
    }

    async function api(path, opts = {}) {
      const headers = {
        Authorization: token ? `Bearer ${token}` : "",
        ...(opts.headers || {}),
      };

      if (!(opts.body instanceof FormData)) {
        headers["Content-Type"] = headers["Content-Type"] || "application/json";
      }

      const res = await fetch(baseUrl + path, {
        ...opts,
        headers,
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: "Request failed" }));
        throw new Error(err.detail || "Request failed");
      }

      return res.json().catch(() => ({}));
    }

    async function login() {
      try {
        clearStatus("loginStatus");
        baseUrl = el("apiBase").value.trim() || baseUrl;
        const form = new URLSearchParams();
        form.append("username", el("loginUsername").value);
        form.append("password", el("loginPassword").value);

        const res = await fetch(baseUrl + "/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: form,
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: "Login failed" }));
          throw new Error(err.detail || "Login failed");
        }

        const data = await res.json();
        token = data.access_token;
        localStorage.setItem("tm_token", token);
        localStorage.setItem("tm_api_base", baseUrl);
        toApp();
        await loadApp();
      } catch (e) {
        setStatus("loginStatus", e.message || "Login failed");
      }
    }

    async function register() {
      try {
        clearStatus("registerStatus");
        const registerBase = el("apiBaseRegister").value.trim();
        if (registerBase) {
          baseUrl = registerBase;
        }

        await api("/auth/register", {
          method: "POST",
          body: JSON.stringify({
            username: el("regUsername").value,
            email: el("regEmail").value,
            fullname: el("regFullname").value,
            password: el("regPassword").value,
          }),
        });

        setStatus("registerStatus", "Account created. Sign in now.", "ok");
      } catch (e) {
        setStatus("registerStatus", e.message || "Registration failed");
      }
    }

    async function loadApp() {
      try {
        const me = await api("/users/me");
        el("userInfo").textContent = `@${me.username}`;

        state.teams = await api("/teams/mine");
        fillTeams();

        if (state.filters.teamId) {
          el("teamSelect").value = state.filters.teamId;
          await loadTeamContext();
        }
      } catch (e) {
        toast(e.message || "Unable to load app", "error");
      }
    }

    function fillTeams() {
      const teamSelect = el("teamSelect");
      const projectTeam = el("projectTeam");

      teamSelect.innerHTML = '<option value="">Select team</option>';
      projectTeam.innerHTML = '<option value="">Select team</option>';

      state.teams.forEach((team) => {
        const a = document.createElement("option");
        a.value = team.id;
        a.textContent = team.name;
        teamSelect.appendChild(a);

        const b = document.createElement("option");
        b.value = team.id;
        b.textContent = team.name;
        projectTeam.appendChild(b);
      });
    }

    async function loadTeamContext() {
      const teamId = state.filters.teamId;
      if (!teamId) {
        state.projects = [];
        state.members = [];
        state.tasks = [];
        fillProjects();
        fillAssignees();
        renderBoard();
        return;
      }

      const team = await api(`/teams/${teamId}`);
      state.members = team.members || [];
      state.projects = await api(`/teams/${teamId}/projects`);

      fillProjects();
      fillAssignees();
      await loadTasks(true);
    }

    function fillProjects() {
      const projectSelect = el("projectSelect");
      const taskProject = el("taskProject");

      projectSelect.innerHTML = '<option value="">All projects</option>';
      taskProject.innerHTML = '<option value="">Select project</option>';

      state.projects.forEach((project) => {
        const p1 = document.createElement("option");
        p1.value = project.id;
        p1.textContent = project.name;
        projectSelect.appendChild(p1);

        const p2 = document.createElement("option");
        p2.value = project.id;
        p2.textContent = project.name;
        taskProject.appendChild(p2);
      });

      if (state.filters.projectId) {
        projectSelect.value = state.filters.projectId;
      }
    }

    function fillAssignees() {
      const assigneeFilter = el("filterAssignee");
      const taskAssignee = el("taskAssignee");

      assigneeFilter.innerHTML = '<option value="">All assignees</option>';
      taskAssignee.innerHTML = '<option value="">Unassigned</option>';

      state.members.forEach((member) => {
        const name = member.fullname || member.username;

        const a = document.createElement("option");
        a.value = member.id;
        a.textContent = name;
        assigneeFilter.appendChild(a);

        const b = document.createElement("option");
        b.value = member.id;
        b.textContent = name;
        taskAssignee.appendChild(b);
      });
    }

    function formatTaskDate(dateString) {
      if (!dateString) return "-";
      return new Date(dateString).toLocaleDateString("en-US", {
        month: "short",
        day: "numeric",
      });
    }

    function formatDateTimeForInput(dateString) {
      if (!dateString) return "";
      const date = new Date(dateString);
      const local = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 16);
    }

    async function loadTasks(reset = true) {
      if (!state.filters.teamId) {
        state.tasks = [];
        renderBoard();
        return;
      }

      if (reset) {
        state.tasks = [];
        state.pagination.offset = 0;
      }

      const query = new URLSearchParams();
      if (state.filters.projectId) query.set("project_id", state.filters.projectId);
      if (state.filters.assignee) query.set("assignee_id", state.filters.assignee);
      if (state.filters.status) query.set("status", state.filters.status);
      if (state.filters.search) query.set("q", state.filters.search);
      query.set("sort_by", state.filters.sort);
      query.set("sort_order", state.filters.sort === "created_at" ? "desc" : "asc");
      query.set("skip", String(state.pagination.offset));
      query.set("limit", String(state.pagination.limit));

      const response = await api(`/tasks/?${query.toString()}`);
      const items = response.items || [];

      if (reset) {
        state.tasks = items;
      } else {
        state.tasks = state.tasks.concat(items);
      }

      state.pagination.offset += items.length;
      state.pagination.hasMore = items.length === state.pagination.limit;

      renderBoard();
      updateLoadMore();
    }

    function updateLoadMore() {
      if (state.pagination.hasMore) {
        el("loadMoreContainer").classList.add("show");
      } else {
        el("loadMoreContainer").classList.remove("show");
      }
    }

    function tasksByStatus(status) {
      return state.tasks.filter((task) => task.status === status);
    }

    function memberName(userId) {
      const member = state.members.find((m) => m.id === userId);
      if (!member) return "Unassigned";
      return member.fullname || member.username;
    }

    function renderBoard() {
      renderColumn("open", "col-open", "count-open");
      renderColumn("in_progress", "col-in-progress", "count-in-progress");
      renderColumn("completed", "col-completed", "count-completed");
    }

    function renderColumn(status, bodyId, countId) {
      const body = el(bodyId);
      const tasks = tasksByStatus(status);
      el(countId).textContent = tasks.length;

      body.innerHTML = "";
      if (!tasks.length) {
        body.innerHTML = '<div class="empty">No tasks</div>';
      }

      tasks.forEach((task) => {
        const card = document.createElement("div");
        card.className = "task";
        card.draggable = true;

        const assignee = task.assignee_id ? memberName(task.assignee_id) : "Unassigned";

        card.innerHTML = `
          <div class="task-title">${task.title}</div>
          <div class="task-meta"><span>${assignee}</span><span>${formatTaskDate(task.due_date)}</span></div>
          <div class="task-actions">
            <button class="task-action" data-action="done">Done</button>
            <button class="task-action" data-action="progress">Start</button>
            <button class="task-action" data-action="details">Details</button>
            <button class="task-action" data-action="delete">Delete</button>
          </div>
        `;

        card.addEventListener("click", () => {
          openTaskModal("edit", task);
        });

        card.addEventListener("dragstart", (event) => {
          event.dataTransfer.setData("task_id", task.id);
        });

        card.querySelectorAll(".task-action").forEach((button) => {
          button.addEventListener("click", async (event) => {
            event.stopPropagation();
            const action = button.getAttribute("data-action");

            if (action === "done") {
              await quickStatusUpdate(task, "completed");
              return;
            }

            if (action === "progress") {
              await quickStatusUpdate(task, "in_progress");
              return;
            }

            if (action === "details") {
              openTaskModal("edit", task);
              return;
            }

            if (action === "delete") {
              const ok = confirm("Delete this task?");
              if (!ok) return;
              try {
                await api(`/tasks/${task.id}`, { method: "DELETE" });
                await loadTasks(true);
                toast("Task deleted", "success");
              } catch (e) {
                toast(e.message || "Delete failed", "error");
              }
            }
          });
        });

        body.appendChild(card);
      });

      body.ondragover = (event) => {
        event.preventDefault();
      };

      body.ondrop = async (event) => {
        event.preventDefault();
        const taskId = event.dataTransfer.getData("task_id");
        if (!taskId) return;
        const task = state.tasks.find((t) => t.id === taskId);
        if (!task || task.status === status) return;
        await quickStatusUpdate(task, status);
      };
    }

    async function quickStatusUpdate(task, nextStatus) {
      const previous = task.status;
      task.status = nextStatus;
      state.undo = { id: task.id, status: previous };
      renderBoard();

      try {
        await api(`/tasks/${task.id}`, {
          method: "PATCH",
          body: JSON.stringify({ status: nextStatus }),
        });
        toast("Status updated. Ctrl+Z to undo", "success");
      } catch (e) {
        task.status = previous;
        renderBoard();
        toast(e.message || "Status update failed", "error");
      }
    }

    function openModal(id) {
      el(id).classList.add("show");
    }

    function closeModal(id) {
      el(id).classList.remove("show");
    }

    function resetTaskModal() {
      clearStatus("taskModalStatus");
      el("taskModalTitle").textContent = "New Task";
      el("submitTaskBtn").textContent = "Create";
      el("taskStatusWrap").style.display = "none";
      el("taskDetailsArea").style.display = "none";
      el("taskTitle").value = "";
      el("taskDesc").value = "";
      el("taskDueDate").value = "";
      el("taskStatus").value = "open";
      el("taskProject").disabled = false;
      if (state.filters.projectId) {
        el("taskProject").value = state.filters.projectId;
      } else {
        el("taskProject").value = "";
      }
      el("taskAssignee").value = "";
      el("commentsList").innerHTML = "<div class=\"empty\">Open an existing task to view comments.</div>";
      el("attachmentsList").innerHTML = "<div class=\"empty\">Open an existing task to view attachments.</div>";
      el("attachmentPreview").classList.remove("show");
      el("attachmentPreview").innerHTML = "";
      el("commentInput").value = "";
      el("fileInput").value = "";
      state.editingId = null;
    }

    function openTaskModal(mode, task = null) {
      resetTaskModal();

      if (mode === "create") {
        openModal("taskModal");
        return;
      }

      if (!task) return;

      state.editingId = task.id;
      el("taskModalTitle").textContent = "Task Details & Edit";
      el("submitTaskBtn").textContent = "Save Changes";
      el("taskStatusWrap").style.display = "block";
      el("taskDetailsArea").style.display = "block";

      el("taskTitle").value = task.title || "";
      el("taskDesc").value = task.description || "";
      el("taskDueDate").value = formatDateTimeForInput(task.due_date);
      el("taskStatus").value = task.status || "open";
      el("taskProject").value = task.project_id || "";
      el("taskProject").disabled = true;
      el("taskAssignee").value = task.assignee_id || "";

      openModal("taskModal");
      loadComments(task.id);
      loadAttachments(task.id);
    }

    function payloadFromTaskModal(isEdit) {
      const dueValue = el("taskDueDate").value;
      const payload = {
        title: el("taskTitle").value,
        description: el("taskDesc").value,
        assignee_id: el("taskAssignee").value || null,
      };

      payload.due_date = dueValue ? new Date(dueValue).toISOString() : null;

      if (!isEdit) {
        payload.project_id = el("taskProject").value;
      } else {
        payload.status = el("taskStatus").value;
      }

      return payload;
    }

    async function submitTask() {
      const isEdit = !!state.editingId;

      try {
        clearStatus("taskModalStatus");

        const payload = payloadFromTaskModal(isEdit);

        if (!payload.title || !payload.title.trim()) {
          throw new Error("Title is required");
        }

        if (!isEdit && !payload.project_id) {
          throw new Error("Select a project");
        }

        if (isEdit) {
          await api(`/tasks/${state.editingId}`, {
            method: "PATCH",
            body: JSON.stringify(payload),
          });
          toast("Task updated", "success");
        } else {
          await api("/tasks/", {
            method: "POST",
            body: JSON.stringify(payload),
          });
          toast("Task created", "success");
        }

        closeModal("taskModal");
        await loadTasks(true);
      } catch (e) {
        setStatus("taskModalStatus", e.message || "Save failed");
      }
    }

    async function loadComments(taskId) {
      try {
        const comments = await api(`/tasks/${taskId}/comments/`);
        const container = el("commentsList");
        container.innerHTML = "";

        if (!comments.length) {
          container.innerHTML = '<div class="empty">No comments yet.</div>';
          return;
        }

        comments.forEach((comment) => {
          const name = memberName(comment.author_id);
          const node = document.createElement("div");
          node.className = "comment-item";
          node.innerHTML = `
            <div class="comment-top">
              <div class="comment-author">${name}</div>
              <div class="comment-actions">
                <button class="btn btn-danger" data-action="delete-comment" type="button">Delete</button>
              </div>
            </div>
            <p class="comment-text">${comment.content}</p>
            <div class="comment-time">${new Date(comment.created_at).toLocaleString()}</div>
          `;
          node.querySelector("button[data-action='delete-comment']").addEventListener("click", async () => {
            await deleteComment(comment.id);
          });
          container.appendChild(node);
        });
      } catch (e) {
        el("commentsList").innerHTML = '<div class="empty">Failed to load comments.</div>';
      }
    }

    async function addComment() {
      if (!state.editingId) {
        toast("Open an existing task to add comments", "error");
        return;
      }

      const content = el("commentInput").value.trim();
      if (!content) {
        toast("Comment cannot be empty", "error");
        return;
      }

      try {
        await api(`/tasks/${state.editingId}/comments/`, {
          method: "POST",
          body: JSON.stringify({ content }),
        });
        el("commentInput").value = "";
        await loadComments(state.editingId);
        toast("Comment added", "success");
      } catch (e) {
        toast(e.message || "Comment failed", "error");
      }
    }

    async function deleteComment(commentId) {
      if (!state.editingId) {
        return;
      }

      const ok = confirm("Delete this comment?");
      if (!ok) return;

      try {
        await api(`/comments/${commentId}`, { method: "DELETE" });
        await loadComments(state.editingId);
        toast("Comment deleted", "success");
      } catch (e) {
        toast(e.message || "Delete failed", "error");
      }
    }

    function attachmentUrl(path) {
      if (!path) return "#";
      if (path.startsWith("http://") || path.startsWith("https://")) {
        return path;
      }
      return baseUrl + path;
    }

    function showAttachmentPreview(fileName, url) {
      const preview = el("attachmentPreview");
      const name = (fileName || "").toLowerCase();
      preview.classList.add("show");

      if (name.endsWith(".png") || name.endsWith(".jpg") || name.endsWith(".jpeg") || name.endsWith(".gif") || name.endsWith(".webp")) {
        preview.innerHTML = `<img src="${url}" alt="${fileName}" />`;
        return;
      }

      if (name.endsWith(".pdf")) {
        preview.innerHTML = `<iframe src="${url}" title="${fileName}"></iframe>`;
        return;
      }

      if (name.endsWith(".txt")) {
        fetch(url)
          .then((r) => r.text())
          .then((text) => {
            preview.innerHTML = `<pre>${text.replace(/[&<>]/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[ch]))}</pre>`;
          })
          .catch(() => {
            preview.innerHTML = `<div class="empty">Unable to preview this text file. Use Open or Download.</div>`;
          });
        return;
      }

      preview.innerHTML = `<div class="empty">Preview not available for this file type. Use Open or Download.</div>`;
    }

    async function loadAttachments(taskId) {
      try {
        const attachments = await api(`/tasks/${taskId}/attachments/`);
        const container = el("attachmentsList");
        const preview = el("attachmentPreview");
        container.innerHTML = "";
        preview.classList.remove("show");
        preview.innerHTML = "";

        if (!attachments.length) {
          container.innerHTML = '<div class="empty">No attachments yet.</div>';
          return;
        }

        attachments.forEach((item) => {
          const node = document.createElement("div");
          node.className = "attachment-item";
          const sizeKb = Math.max(1, Math.round(item.file_size / 1024));
          const fileUrl = attachmentUrl(item.file_url);
          node.innerHTML = `
            <div class="attachment-info">
              <strong>${item.file_name}</strong>
              <div class="attachment-actions">
                <button class="btn btn-secondary" data-action="view" type="button">View</button>
                <a class="btn btn-secondary" href="${fileUrl}" target="_blank" rel="noreferrer">Open</a>
                <a class="btn btn-secondary" data-action="download" href="${fileUrl}">Download</a>
                <button class="btn btn-danger" data-action="delete-attachment" type="button">Delete</button>
              </div>
            </div>
            <div class="attachment-size">${sizeKb} KB</div>
          `;
          node.querySelector("button[data-action='view']").addEventListener("click", () => {
            showAttachmentPreview(item.file_name, fileUrl);
          });
          node.querySelector("a[data-action='download']").setAttribute("download", item.file_name || "attachment");
          node.querySelector("button[data-action='delete-attachment']").addEventListener("click", async () => {
            await deleteAttachment(item.id);
          });
          container.appendChild(node);
        });
      } catch (e) {
        el("attachmentsList").innerHTML = '<div class="empty">Failed to load attachments.</div>';
      }
    }

    async function addAttachment() {
      if (!state.editingId) {
        toast("Open an existing task to add attachments", "error");
        return;
      }

      const file = el("fileInput").files[0];
      if (!file) {
        toast("Choose a file first", "error");
        return;
      }

      try {
        const formData = new FormData();
        formData.append("file", file);

        await api(`/tasks/${state.editingId}/attachments/`, {
          method: "POST",
          body: formData,
          headers: {},
        });

        el("fileInput").value = "";
        await loadAttachments(state.editingId);
        toast("Attachment uploaded", "success");
      } catch (e) {
        toast(e.message || "Upload failed", "error");
      }
    }

    async function deleteAttachment(attachmentId) {
      if (!state.editingId) {
        return;
      }

      const ok = confirm("Delete this attachment?");
      if (!ok) return;

      try {
        await api(`/attachments/${attachmentId}`, { method: "DELETE" });
        await loadAttachments(state.editingId);
        toast("Attachment deleted", "success");
      } catch (e) {
        toast(e.message || "Delete failed", "error");
      }
    }

    async function createProject() {
      try {
        clearStatus("projectModalStatus");
        const teamId = el("projectTeam").value;
        if (!teamId) throw new Error("Select a team");

        await api("/projects/", {
          method: "POST",
          body: JSON.stringify({
            name: el("projectName").value,
            description: el("projectDesc").value,
            team_id: teamId,
          }),
        });

        closeModal("projectModal");
        el("projectName").value = "";
        el("projectDesc").value = "";

        if (state.filters.teamId === teamId) {
          await loadTeamContext();
        }

        toast("Project created", "success");
      } catch (e) {
        setStatus("projectModalStatus", e.message || "Project creation failed");
      }
    }

    async function createTeam() {
      try {
        clearStatus("teamModalStatus");

        await api("/teams/", {
          method: "POST",
          body: JSON.stringify({
            name: el("teamName").value,
            description: el("teamDesc").value,
          }),
        });

        closeModal("teamModal");
        el("teamName").value = "";
        el("teamDesc").value = "";

        state.teams = await api("/teams/mine");
        fillTeams();
        toast("Team created", "success");
      } catch (e) {
        setStatus("teamModalStatus", e.message || "Team creation failed");
      }
    }

    function debounce(fn, wait) {
      let timer;
      return () => {
        clearTimeout(timer);
        timer = setTimeout(fn, wait);
      };
    }

    document.querySelectorAll(".auth-tab-btn").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".auth-tab-btn").forEach((x) => x.classList.remove("active"));
        document.querySelectorAll(".auth-tab-content").forEach((x) => x.classList.remove("active"));
        button.classList.add("active");
        el(button.dataset.tab + "Tab").classList.add("active");
      });
    });

    el("loginBtn").addEventListener("click", login);
    el("registerBtn").addEventListener("click", register);

    el("logoutBtn").addEventListener("click", () => {
      token = "";
      localStorage.removeItem("tm_token");
      toAuth();
    });

    el("teamSelect").addEventListener("change", async () => {
      state.filters.teamId = el("teamSelect").value;
      state.filters.projectId = "";
      localStorage.setItem("tm_team_id", state.filters.teamId);
      localStorage.removeItem("tm_project_id");
      await loadTeamContext();
    });

    el("projectSelect").addEventListener("change", async () => {
      state.filters.projectId = el("projectSelect").value;
      localStorage.setItem("tm_project_id", state.filters.projectId);
      await loadTasks(true);
    });

    el("filterAssignee").addEventListener("change", debounce(async () => {
      state.filters.assignee = el("filterAssignee").value;
      await loadTasks(true);
    }, 250));

    el("filterStatus").addEventListener("change", debounce(async () => {
      state.filters.status = el("filterStatus").value;
      await loadTasks(true);
    }, 250));

    el("searchInput").addEventListener("input", debounce(async () => {
      state.filters.search = el("searchInput").value;
      await loadTasks(true);
    }, 250));

    el("sortSelect").addEventListener("change", async () => {
      state.filters.sort = el("sortSelect").value;
      await loadTasks(true);
    });

    el("clearFiltersBtn").addEventListener("click", async () => {
      state.filters.assignee = "";
      state.filters.status = "";
      state.filters.search = "";
      el("filterAssignee").value = "";
      el("filterStatus").value = "";
      el("searchInput").value = "";
      await loadTasks(true);
    });

    el("refreshBtn").addEventListener("click", () => loadTasks(true));
    el("loadMoreBtn").addEventListener("click", () => loadTasks(false));

    el("createTaskBtn").addEventListener("click", () => openTaskModal("create"));
    el("createProjectBtn").addEventListener("click", () => {
      clearStatus("projectModalStatus");
      openModal("projectModal");
    });
    el("createTeamBtn").addEventListener("click", () => {
      clearStatus("teamModalStatus");
      openModal("teamModal");
    });

    el("submitTaskBtn").addEventListener("click", submitTask);
    el("cancelTaskBtn").addEventListener("click", () => closeModal("taskModal"));
    el("submitProjectBtn").addEventListener("click", createProject);
    el("cancelProjectBtn").addEventListener("click", () => closeModal("projectModal"));
    el("submitTeamBtn").addEventListener("click", createTeam);
    el("cancelTeamBtn").addEventListener("click", () => closeModal("teamModal"));

    el("addCommentBtn").addEventListener("click", addComment);
    el("addAttachmentBtn").addEventListener("click", addAttachment);

    document.addEventListener("keydown", async (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "n") {
        event.preventDefault();
        openTaskModal("create");
      }

      if (event.key === "Escape") {
        closeModal("taskModal");
        closeModal("projectModal");
        closeModal("teamModal");
      }

      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z" && state.undo) {
        event.preventDefault();
        const undo = state.undo;
        const target = state.tasks.find((x) => x.id === undo.id);
        if (!target) return;
        const current = target.status;
        target.status = undo.status;
        renderBoard();
        state.undo = null;

        try {
          await api(`/tasks/${undo.id}`, {
            method: "PATCH",
            body: JSON.stringify({ status: undo.status }),
          });
          toast("Undo complete", "success");
        } catch (e) {
          target.status = current;
          renderBoard();
          toast(e.message || "Undo failed", "error");
        }
      }
    });

    ["loginUsername", "loginPassword"].forEach((id) => {
      el(id).addEventListener("keypress", (event) => {
        if (event.key === "Enter") {
          login();
        }
      });
    });

    ["regUsername", "regPassword", "regEmail"].forEach((id) => {
      el(id).addEventListener("keypress", (event) => {
        if (event.key === "Enter") {
          register();
        }
      });
    });

    if (token) {
      toApp();
      loadApp();
    } else {
      toAuth();
    }
  </script>
</body>
</html>
